<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Tech Conference Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Tech Conference Registration</h3>

</div>

<div class="card-body">

<form id="regForm">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" id="name" required>
</div>

<div class="mb-3">
<label class="form-label">Professional Email</label>
<input type="email" class="form-control" id="email" required>
</div>

<div class="mb-3">
<label class="form-label">Company / Institution</label>
<input type="text" class="form-control" id="company">
</div>

<div class="mb-3">

<label class="form-label">Attendance Type</label>

<div>
<input type="radio" name="type" value="Virtual"> Virtual
<input type="radio" name="type" value="In-Person"> In Person
</div>

</div>

<button class="btn btn-success">Register</button>

<button type="reset" class="btn btn-secondary">Clear</button>

</form>

<hr>

<a href="analytics.html" class="btn btn-info">
View Event Analytics
</a>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
